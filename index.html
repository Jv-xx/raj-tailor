<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raj Tailor | Home</title>
  <meta name="description" content="Raj Tailor - Perfect Fit for Every Occasion. Premium men’s tailoring in Surat, India." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#1e63ff;
      --primary-dark:#144ecc;
      --bg:#f5f8ff;
      --white:#ffffff;
      --text:#152238;
      --muted:#5f6f89;
      --border:#dce5f5;
      --shadow:0 10px 28px rgba(13,52,132,.12);
      --radius:14px;
      --container:1120px;
      --header-h:72px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Poppins',sans-serif;color:var(--text);background:var(--bg);line-height:1.6}
    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    .container{width:min(92%,var(--container));margin-inline:auto}
    .section{padding:78px 0}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;padding:.85rem 1.25rem;font-weight:600;cursor:pointer;transition:.25s ease}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 10px 20px rgba(30,99,255,.24)}
    .btn-outline{background:#fff;color:var(--primary);border:1px solid #bcd1ff}
    .btn:hover{transform:translateY(-2px)}
    .btn-group{display:flex;gap:.7rem;flex-wrap:wrap}
    .navbar{position:sticky;top:0;z-index:1000;height:var(--header-h);background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .nav-wrap{height:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .logo{font-weight:800;font-size:1.25rem;color:var(--primary)}
    .nav-links{display:flex;gap:.35rem}
    .nav-links a{padding:.45rem .7rem;border-radius:8px;font-weight:500;color:#2b3b57}
    .nav-links a:hover,.nav-links a.active{background:#eaf0ff;color:var(--primary)}
    .menu-btn{display:none;border:1px solid var(--border);background:#fff;padding:.45rem .7rem;border-radius:10px;cursor:pointer}
    .hero{padding:95px 0 70px;background:radial-gradient(circle at 85% 0%,#dce8ff 0%,transparent 45%),radial-gradient(circle at 0% 100%,#e9f1ff 0%,transparent 45%)}
    .hero h1{font-size:clamp(2rem,5vw,3.3rem);line-height:1.15;margin-bottom:8px}
    .hero p{color:var(--muted);margin-bottom:16px}
    .map-wrap{margin-top:24px;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
    .map-wrap iframe{width:100%;height:360px;border:0}
    .wa-float{position:fixed;right:16px;bottom:16px;z-index:1200;width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:#25D366;color:#fff;font-size:1.5rem;font-weight:700;box-shadow:0 10px 24px rgba(37,211,102,.45)}
    @media (max-width:980px){
      .nav-links{position:absolute;top:var(--header-h);left:0;right:0;background:#fff;border-bottom:1px solid var(--border);display:grid;gap:.25rem;padding:.65rem 4%;transform:translateY(-130%);opacity:0;pointer-events:none;transition:.25s}
      .nav-links.open{transform:translateY(0);opacity:1;pointer-events:auto}
      .menu-btn{display:inline-flex}
    }
    @media (max-width:640px){.map-wrap iframe{height:300px}}
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <a class="logo" href="index.html">Raj Tailor</a>
      <button class="menu-btn" id="menuBtn">Menu</button>
      <nav class="nav-links" id="navLinks">
        <a class="active" href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Raj Tailor</h1>
        <p><strong>Perfect Fit for Every Occasion</strong> — Professional men’s tailoring in Surat, India.</p>
        <div class="btn-group">
          <a class="btn btn-primary" target="_blank" rel="noopener"
             href="https://wa.me/919925888135?text=Hello%20Raj%20Tailor,%20I%20want%20to%20book%20an%20appointment">Book Appointment</a>
          <a class="btn btn-outline" target="_blank" rel="noopener"
             href="https://www.google.com/maps/dir/?api=1&destination=21.200753,72.861514">Get Directions</a>
        </div>

        <div class="map-wrap">
          <iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps?q=21.2007542,72.8608703&z=19&output=embed"
            title="Raj Tailor Map"></iframe>
        </div>
      </div>
    </section>
  </main>

  <a class="wa-float" target="_blank" rel="noopener"
     href="https://wa.me/919925888135?text=Hello%20Raj%20Tailor,%20I%20want%20to%20book%20an%20appointment"
     aria-label="WhatsApp">✆</a>

  <script>
    const menuBtn=document.getElementById('menuBtn'),navLinks=document.getElementById('navLinks');
    menuBtn.addEventListener('click',()=>navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>navLinks.classList.remove('open')));
  </script>
</body>
</html>
